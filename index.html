<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuPrint Integrated Analysis Report</title>

  <!-- Open Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Open Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* 페이지 아트보드: 900px 카드 + 좌우 padding 40px = 980px */
    .np-page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 40px 64px 40px;
    }

    /* =========================
       A. HEADER ROW (텍스트 + QR)
       ========================= */
    .np-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .np-left-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .np-logo {
      width: 172px;
      height: 39px;
      display: block;
      margin-bottom: 12px;
    }

    .np-header-title-line1 {
      font-size: 13px;
      font-weight: 400;
      color: #000000;
    }

    .np-header-title-main {
      font-size: 30px;
      font-weight: 700;
      color: #000000;
      line-height: 1.2;
    }

    .np-header-sub {
      font-size: 13px;
      font-weight: 400;
    }

    .np-header-timestamp {
      font-size: 13px;
      font-weight: 400;
    }

    /* QR + 검증 텍스트: 모두 우측정렬 */
    .np-verify-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      margin-top: 10px;
    }

    .np-author-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 25px;
      text-align: right;
      color: #000000;
    }

    .np-verify-label {
      font-size: 11px;
      font-weight: 400;
    }

    .np-qr {
      width: 74px;
      height: 74px;
      object-fit: contain;
      display: block;
      margin-bottom: 8px;
    }

    /* =========================
       B. 1. Overview Metrics
       ========================= */
    .np-section-title-small {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #000000;
    }

    .np-metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .np-metric-card {
      border: 1px solid #ededed;
      border-radius: 10px;
      padding: 16px 18px;
      background: #ffffff;
      box-shadow: none;
    }

    /* =========================
       C. 2. Content Summary
       ========================= */
    .np-section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      margin-bottom: 12px;
    }

    .np-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #000000;
    }

    .np-meta-inline {
      font-size: 11px;
      font-weight: 400;
    }

    .np-summary-container {
      width: 900px;
      max-width: 100%;
      margin: 0 auto;
      border: 1px solid #ededed;
      border-radius: 10px;
      padding: 20px 22px;
      box-shadow: none;
    }

    .np-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .np-text {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .np-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .np-tag {
      font-size: 11px;
      font-weight: 400;
      padding: 4px 10px;
      border-radius: 16px;
      background: #ededed;
      color: #000000;
    }

    /* =========================
       D. 3. AI Usage Classification
       ========================= */
    .np-ai-section {
      margin-top: 40px;
    }

    .np-ai-title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .np-ai-title {
      font-size: 13px;
      font-weight: 700;
      color: #000000;
    }

    .np-ai-submeta {
      font-size: 11px;
      font-weight: 400;
      text-align: right;
    }

    .np-ai-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)); /* 50% / 50% */
      gap: 16px;
    }

    .np-ai-card {
      border: 1px solid #ededed;
      border-radius: 10px;
      padding: 16px 18px;
      background: #ffffff;
      box-shadow: none;
    }

    .np-ai-card-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .np-ai-card-text {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
    }

    .np-ai-bar-wrap {
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .np-ai-bar-label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .np-ai-bar {
      width: 100%;
      height: 40px;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      background: #ededed;
      position: relative;
    }

    .np-ai-bar-seg {
      height: 100%;
      border: none;
      box-sizing: border-box;
    }

    .np-ai-bar-human {
      background: #fdaa1e;
    }

    .np-ai-bar-hybrid {
      background: #e5e5e5;
    }

    .np-ai-bar-ai {
      background: #47b8e0;
    }

    .np-ai-bar-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      pointer-events: none;
      white-space: nowrap;
    }

    .np-ai-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .np-ai-legend-item {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 400;
    }

    .np-ai-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 2px;
    }

    .np-ai-note-list {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.4;
      list-style: none;
    }

    .np-ai-note-list li {
      margin-left: 0;
      margin-bottom: 2px;
    }

    .np-ai-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    /* =========================
       E. 4. CFF Profile Section
       ========================= */

    .np-cff-title-outside {
      font-size: 13px;
      font-weight: 700;
      color: #000000;
      margin-top: 40px;
      margin-bottom: 12px;
    }

    .np-cff-section {
      margin-top: 0;
      border: 1px solid #ededed;
      border-radius: 10px;
      padding: 20px 22px 22px 22px;
      background: #ffffff;
    }

    /* Fingerprint type / Secondary tendency 2열 레이아웃 */
    .np-cff-fingerprint-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      margin-bottom: 24px;
      align-items: flex-start;
    }

    .np-cff-fp-box {
      background: #f4f4f4;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .np-cff-fp-title {
      font-size: 13px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 4px;
    }

    .np-cff-fp-value {
      font-size: 18px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 4px;
    }

    .np-cff-fp-sub {
      font-size: 13px;
      font-weight: 400;
      color: #000000;
    }

    .np-cff-interpret-title {
      font-size: 13px;
      font-weight: 700;
      margin: 4px 0 10px 0;
      color: #000000;
    }

    .np-cff-fp-desc {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: #000000;
      margin-bottom: 8px;
    }

    /* CFF Radar + Indicators grid */
    .np-cff-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 50% / 50% */
      gap: 32px;
    }

    .np-cff-card {
      border: none;
      border-radius: 0;
      padding: 12px 0 0 0;
      background: transparent;
      box-shadow: none;
    }

    .np-cff-card.table-side {
      margin-left: 0;
    }

    .np-cff-card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .np-cff-card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .np-cff-pill {
      font-size: 11px;
      font-weight: 400;
    }

    .np-cff-chart-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 4px 0;
      min-height: 260px;
    }

    #cffRadarChart {
      max-width: 320px;
      max-height: 320px;
    }

    .np-cff-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 400;
      color: #374151;
    }

    .np-cff-legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(71, 184, 224, 0.22);
      border: 1px solid #47b8e0;
    }

    .np-cff-chart-caption {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.4;
      margin-top: 6px;
    }

    .np-cff-table-wrap {
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid #ededed;
    }

    .np-cff-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .np-cff-table th,
    .np-cff-table td {
      padding: 8px 12px;
    }

    .np-cff-table th {
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #e5e7eb;
    }

    .np-cff-table td {
      border-bottom: 1px solid #f3f4f6;
    }

    .np-cff-table td:last-child,
    .np-cff-table th:last-child {
      text-align: right;
    }

    .np-cff-code {
      font-weight: 400;
      font-size: 11px;
      text-decoration: none;
    }

    /* =========================
       F. 5. ARC Reasoning Analysis
       ========================= */

    .np-arc-section {
      margin-top: 40px;
    }

    .np-arc-band-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 12px;
    }

    .np-arc-card {
      border-radius: 10px;
      padding: 14px 18px;
      background: #f4f7ff;
      border: 1px solid #e0e7ff;
    }

    .np-arc-card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      color: #4b5563;
    }

    .np-arc-card-main {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #000000;
    }

    .np-arc-card-sub {
      font-size: 12px;
      font-weight: 400;
      color: #000000;
      line-height: 1.4;
    }

    .np-arc-strength-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .np-arc-strength-card {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.4;
    }

    .np-arc-strength-card.primary {
      background: #ecfdf3;
      border: 1px solid #bbf7d0;
    }

    .np-arc-strength-card.growth {
      background: #fffbeb;
      border: 1px solid #fed7aa;
    }

    .np-arc-strength-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      color: #4b5563;
    }

    .np-arc-strength-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .np-arc-tag-chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: #000000;
    }

    .np-arc-desc {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 14px;
      color: #000000;
    }

    .np-arc-table-wrap {
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      background: #ffffff;
    }

    .np-arc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .np-arc-table th,
    .np-arc-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f3f4f6;
    }

    .np-arc-table th {
      background: #f9fafb;
      font-weight: 600;
      text-align: left;
      color: #111827;
    }

    .np-arc-table td:nth-child(1),
    .np-arc-table th:nth-child(1) {
      width: 40px;
      text-align: center;
      font-weight: 600;
    }

    .np-arc-table td:nth-child(3),
    .np-arc-table th:nth-child(3) {
      width: 60px;
      text-align: right;
      white-space: nowrap;
    }

    .np-arc-guidance-box {
      margin-top: 14px;
      border-radius: 10px;
      padding: 12px 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      font-size: 12px;
      line-height: 1.6;
      color: #7c2d12;
    }

    .np-arc-guidance-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    /* =========================
       G. RESPONSIVE
       ========================= */

    @media (max-width: 980px) {
      .np-page {
        padding: 32px 20px 48px 20px;
      }
    }

    @media (max-width: 900px) {
      .np-ai-grid {
        grid-template-columns: 1fr;   /* 모바일에서는 세로 1열 */
      }

      .np-ai-submeta {
        text-align: left;
        margin-top: 4px;
      }

      .np-cff-grid {
        grid-template-columns: 1fr;
      }

      .np-cff-fingerprint-grid {
        grid-template-columns: 1fr;
      }

      .np-cff-card.table-side {
        margin-left: 0;
      }

      .np-arc-band-row,
      .np-arc-strength-row {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <!-- Chart.js for CFF radar -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="np-page">

  <!-- HEADER -->
